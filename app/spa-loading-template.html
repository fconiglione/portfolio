<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff;
        color: #111;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .loader {
        width: min(92vw, 460px);
        padding: 1.25rem;
        text-align: center;
      }

      .name {
        margin: 0;
        font-size: clamp(1.25rem, 2.5vw, 1.8rem);
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 0.45rem 0 1rem;
        font-size: 0.92rem;
        color: #666;
      }

      .track {
        width: 100%;
        height: 2px;
        background: #e5e5e5;
        overflow: hidden;
      }

      .bar {
        width: 36%;
        height: 100%;
        background: #111;
        animation: load 1.1s ease-in-out infinite;
      }

      @keyframes load {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #111;
          color: #f5f5f5;
        }

        .subtitle {
          color: #b0b0b0;
        }

        .track {
          background: #333;
        }

        .bar {
          background: #f5f5f5;
        }
      }
    </style>
  </head>
  <body>
    <main class="loader" role="status" aria-live="polite" aria-label="Loading site">
      <h1 class="name">Francesco Coniglione</h1>
      <p class="subtitle">AML and Financial Crime Writing</p>
      <div class="track" aria-hidden="true">
        <div class="bar"></div>
      </div>
    </main>
  </body>
</html>
